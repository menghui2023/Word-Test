<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教師專用：AI 克漏字題庫生產站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #f0fdf4; color: #1f2937; }
    </style>
</head>
<body class="antialiased p-4 sm:p-8">

<div class="max-w-4xl mx-auto bg-white p-6 sm:p-10 rounded-2xl shadow-xl border border-green-200">
    <div class="border-b-2 border-green-600 pb-4 mb-6 flex justify-between items-center">
        <h1 class="text-2xl sm:text-3xl font-bold text-green-800">🛠️ 教師專用：AI 克漏字題庫生產站</h1>
    </div>
    
    <p class="text-gray-600 mb-8 leading-relaxed">
        本系統具備雙模式：可接收主系統傳來的單字，亦可獨立上傳文字檔 (.txt) 抽字。請輸入金鑰並呼叫 AI 為您量身打造高階克漏字測驗。
    </p>

    <!-- 步驟 1：載入題庫 -->
    <div class="mb-8 bg-green-50 p-5 rounded-xl border border-green-200" id="step1-container">
        <h2 class="font-bold text-green-900 mb-3 text-lg">1️⃣ 上傳單字題庫來源 (獨立模式使用)</h2>
        <input type="file" id="file-upload" accept=".txt" multiple class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-100 file:text-green-700 hover:file:bg-green-200 cursor-pointer mb-2 transition-all">
        <p id="pool-status" class="text-sm font-bold text-gray-500">目前單字量：0</p>
    </div>

    <!-- 步驟 2：決定命題單字 -->
    <div class="mb-8 bg-blue-50 p-5 rounded-xl border border-blue-200">
        <div class="flex flex-col sm:flex-row justify-between sm:items-center mb-3 gap-2">
            <h2 class="font-bold text-blue-900 text-lg">2️⃣ 決定命題單字 (6 個字)</h2>
            <button id="draw-words-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-1 px-4 rounded shadow transition text-sm disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                🎲 從題庫隨機抽 6 字
            </button>
        </div>
        <p id="words-instruction" class="text-xs text-blue-700 mb-2">您可以點擊右上方按鈕自動抽取，也可以在下方直接「手動輸入/修改」您這次特別想考的單字：</p>
        <textarea id="target-words" class="w-full h-28 border-2 border-blue-300 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-600 bg-white" placeholder="請先上傳題庫並點擊「隨機抽字」，或直接在此輸入 6 個單字（含詞性與中文，用逗號隔開）。"></textarea>
    </div>

    <!-- 步驟 3：設定 API Key -->
    <div class="mb-8 bg-yellow-50 p-5 rounded-xl border border-yellow-300">
        <h2 class="font-bold text-yellow-900 mb-2 text-lg">3️⃣ Google Gemini API 金鑰</h2>
        <p class="text-xs text-yellow-700 mb-3">請貼上您的金鑰 (AIzaSy...)。系統會安全地儲存於此瀏覽器中，不須每次重新輸入。</p>
        <input type="password" id="api-key-input" class="w-full border-2 border-yellow-400 rounded-lg p-3 focus:outline-none focus:border-yellow-600 font-mono text-sm" placeholder="貼上 API Key">
    </div>

    <!-- 執行按鈕 -->
    <button id="generate-btn" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-4 px-4 rounded-xl shadow-lg transition duration-300 text-xl mb-6 flex justify-center items-center gap-2">
        <span>✨ 呼叫 AI 開始寫作</span>
    </button>

    <!-- 狀態與結果 -->
    <div id="status-msg" class="text-center font-bold mb-6 hidden text-lg animate-pulse py-2 px-4 rounded-lg"></div>

    <div class="mb-4">
        <div class="flex justify-between items-end mb-2">
            <label class="block text-gray-800 font-bold text-lg">📝 生成結果 (JSON 格式)</label>
            <button id="copy-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold py-2 px-4 rounded shadow hidden transition">
                📋 一鍵複製 JSON
            </button>
        </div>
        <textarea id="result-output" class="w-full h-80 border-2 border-gray-300 rounded-xl p-4 font-mono text-sm focus:outline-none focus:border-indigo-500 bg-gray-50 shadow-inner" readonly placeholder="AI 產出的結果將顯示於此..."></textarea>
        <p class="text-xs text-gray-500 mt-2">💡 提示：複製後請回到「主系統」，貼在管理題庫視窗的第三步區塊中即可立即出卷！</p>
    </div>
</div>

<script>
    let totalWordPool = [];

    // 系統啟動時檢查網址參數 (判斷是否為主系統連動模式)
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const wordsFromURL = urlParams.get('words');

        if (wordsFromURL) {
            // 進入「連動模式」：自動填入從主系統傳來的單字
            document.getElementById('target-words').value = wordsFromURL;
            document.getElementById('pool-status').innerText = "🔗 連動成功：已接收主系統傳遞的單字！";
            document.getElementById('pool-status').classList.replace('text-gray-500', 'text-blue-600');
            document.getElementById('words-instruction').innerText = "已自動為您填入主系統傳遞的重點單字，您也可以在此手動微調：";
            
            // 停用上傳與抽字按鈕，避免老師操作混淆
            document.getElementById('file-upload').disabled = true;
            document.getElementById('file-upload').classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('draw-words-btn').disabled = true;
            document.getElementById('draw-words-btn').classList.add('hidden');
        }
    };

    // 解析 txt (獨立模式用)
    function parseTextToJSON(text) {
        const wordList = [];
        const lines = text.split(/[\r\n]+/);
        for (let line of lines) {
            if (!line.trim() || line.trim() === '單字\t詞性\t中文解釋\t例句') continue;
            const parts = line.split('\t');
            if (parts.length >= 3) {
                let wordRaw = parts[0].trim().replace(/^\d+\.?\s*/, ''); 
                let word = wordRaw.replace(/\[.*?\]/, '').trim();
                let pos = parts[1].trim();
                let meaning = parts[2].trim().split('|')[0].split('；')[0].split(';')[0].trim();
                if (word && meaning) {
                    wordList.push({ word, pos, meaning });
                }
            }
        }
        return wordList;
    }

    // 處理檔案上傳 (獨立模式用)
    document.getElementById('file-upload').addEventListener('change', async function(e) {
        const files = e.target.files;
        if (!files || files.length === 0) return;
        
        let combinedPool = [];
        for (let i = 0; i < files.length; i++) {
            const text = await files[i].text();
            combinedPool.push(...parseTextToJSON(text));
        }

        totalWordPool = combinedPool;
        document.getElementById('pool-status').innerText = `✅ 成功載入 ${totalWordPool.length} 個單字`;
        document.getElementById('pool-status').classList.replace('text-gray-500', 'text-green-600');
        
        if (totalWordPool.length >= 6) {
            document.getElementById('draw-words-btn').disabled = false;
        }
    });

    // 隨機抽字 (獨立模式用)
    document.getElementById('draw-words-btn').addEventListener('click', () => {
        if (totalWordPool.length < 6) return;
        let shuffled = [...totalWordPool].sort(() => 0.5 - Math.random());
        let selected = shuffled.slice(0, 6);
        let wordListStr = selected.map(w => `${w.word} (${w.pos} ${w.meaning})`).join(',\n');
        document.getElementById('target-words').value = wordListStr;
    });

    // 載入與儲存 API Key
    const apiKeyInput = document.getElementById('api-key-input');
    const savedKey = localStorage.getItem('gemini_api_key_standalone');
    if (savedKey) apiKeyInput.value = savedKey;

    apiKeyInput.addEventListener('change', (e) => {
        localStorage.setItem('gemini_api_key_standalone', e.target.value.trim());
    });

    // 呼叫 Gemini API
    document.getElementById('generate-btn').addEventListener('click', async () => {
        const apiKey = apiKeyInput.value.trim();
        const targetWords = document.getElementById('target-words').value.trim();

        if (!apiKey) return alert("請先輸入您的 Gemini API Key！");
        if (!targetWords) return alert("請先載入題庫抽字，或手動輸入 6 個單字！");
        
        localStorage.setItem('gemini_api_key_standalone', apiKey);

        const statusMsg = document.getElementById('status-msg');
        const resultOutput = document.getElementById('result-output');
        const copyBtn = document.getElementById('copy-btn');
        const generateBtn = document.getElementById('generate-btn');

        statusMsg.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
        statusMsg.classList.add('bg-blue-100', 'text-blue-800');
        statusMsg.innerText = "⏳ AI 教授正在燒腦撰寫中，請稍候約 10~15 秒...";
        resultOutput.value = "";
        copyBtn.classList.add('hidden');
        generateBtn.disabled = true;
        generateBtn.classList.add('opacity-70', 'cursor-not-allowed');

        const prompt = `你現在是一位台灣「高級中等學校英文單字比賽」的專業命題教授。請根據我提供的 6 個單字，撰寫一篇符合決賽水準的「短文克漏字 (Passage Cloze Test)」題組。
【文章與測驗要求】
1. 題量：1 篇短文，包含 5 個空格。
2. 格式：撰寫一篇約 150-200 字的高中進階程度英文短文（主題可為科普、歷史、社會等）。
3. 選項：請使用以下單字作為 (A) 到 (F) 的選項：
[ ${targetWords} ]
4. 要求：著重測驗脈絡理解與進階詞彙。其中 5 個字為正解填入空格，必須留下 1 個字為具備迷惑性的「誘答字」。
5. 空格格式：請在文章中將這 5 個答案挖空，替換為 HTML 標籤：<span class='px-1 border-b border-black font-bold text-red-600'> 題號 </span>（題號依序為 1, 2, 3, 4, 5）。

【輸出格式要求】
請「只」輸出合法的 JSON 格式物件，絕對不要有 markdown 標記 (\`\`\`json)、多餘的逗號或其他廢話。為避免解析錯誤，翻譯 (trans) 欄位的字串內「絕對不可包含換行符號(\n)」與「未跳脫的雙引號(\")」：
{
  "words": ["(A) 選項1", "(B) 選項2", "(C) 選項3", "(D) 選項4", "(E) 選項5", "(F) 選項6"],
  "paras": ["第一段...", "第二段..."],
  "ans": ["A", "C", "D", "B", "E"],
  "trans": "繁體中文流暢翻譯(此處不可有換行符號)。",
  "exp": ["第1題解析", "第2題解析", "第3題解析", "第4題解析", "第5題解析"],
  "distractor": "(F) 誘答字英文 (中文) - 簡述為何為誘答"
}`;

        try {
            // 使用穩定支援的生成端點
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.7 }
                })
            });

            const data = await response.json();
            
            if (!response.ok) throw new Error(data.error.message || "API 請求失敗");

            let aiText = data.candidates[0].content.parts[0].text;
            
            // 強效淨化引擎 (確保不會有亂碼或多餘標籤干擾主系統解析)
            aiText = aiText.replace(/```json/gi, '').replace(/```/g, '').trim();
            let jsonStart = aiText.indexOf('{');
            let jsonEnd = aiText.lastIndexOf('}');
            if (jsonStart !== -1 && jsonEnd !== -1 && jsonEnd > jsonStart) {
                aiText = aiText.substring(jsonStart, jsonEnd + 1);
            }
            // 嘗試修復常見的結尾逗號錯誤
            aiText = aiText.replace(/,\s*([\]}])/g, '$1');

            // 嚴格驗證是否為合法 JSON
            JSON.parse(aiText);

            resultOutput.value = aiText;
            statusMsg.classList.replace('bg-blue-100', 'bg-green-100');
            statusMsg.classList.replace('text-blue-800', 'text-green-800');
            statusMsg.innerText = "✅ 題目生成成功！請點擊按鈕一鍵複製。";
            copyBtn.classList.remove('hidden');

        } catch (error) {
            statusMsg.classList.replace('bg-blue-100', 'bg-red-100');
            statusMsg.classList.replace('text-blue-800', 'text-red-800');
            if (error.name === 'SyntaxError') {
                statusMsg.innerText = `❌ 錯誤：AI 產出的格式有瑕疵，請點擊再次生成。`;
            } else {
                statusMsg.innerText = `❌ 生成失敗：${error.message}`;
            }
        } finally {
            generateBtn.disabled = false;
            generateBtn.classList.remove('opacity-70', 'cursor-not-allowed');
        }
    });

    // 複製按鈕功能
    document.getElementById('copy-btn').addEventListener('click', () => {
        const resultOutput = document.getElementById('result-output');
        resultOutput.select();
        navigator.clipboard.writeText(resultOutput.value).then(() => {
            const btn = document.getElementById('copy-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = "✅ 已複製！";
            btn.classList.replace('bg-indigo-600', 'bg-green-600');
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.replace('bg-green-600', 'bg-indigo-600');
            }, 2000);
        });
    });
</script>
</body>
</html>
