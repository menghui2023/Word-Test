<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 克漏字短文全自動生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="antialiased p-6 sm:p-10">

<div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-200">
    <div class="flex items-center gap-3 mb-2">
        <span class="text-3xl">✨</span>
        <h1 class="text-2xl font-bold text-indigo-800">AI 克漏字短文全自動生成器</h1>
    </div>
    <p class="text-gray-600 mb-6 border-b pb-4 text-sm">已成功接收主系統傳來的單字，點擊下方按鈕即可呼叫 Google Gemini AI 生成測驗 JSON。</p>

    <!-- 步驟 1：確認單字 -->
    <div class="mb-6">
        <h2 class="font-bold text-gray-800 mb-2 flex items-center gap-2">📌 目前命題單字：</h2>
        <div id="word-list-display" class="bg-indigo-50 text-indigo-900 p-4 rounded-lg border border-indigo-200 font-medium text-lg italic leading-relaxed shadow-inner">
            讀取中...
        </div>
    </div>

    <!-- 步驟 2：設定 API Key -->
    <div class="mb-6 bg-yellow-50 p-5 rounded-xl border border-yellow-300 shadow-sm">
        <h2 class="font-bold text-yellow-900 mb-2 flex items-center gap-2">🔑 Google Gemini API Key</h2>
        <p class="text-xs text-yellow-800 mb-3 leading-relaxed">請貼上您的 API Key。金鑰將安全地儲存在本機瀏覽器中，不會上傳到任何伺服器。</p>
        <input type="password" id="api-key-input" placeholder="貼上 AIzaSy... 開頭的金鑰" class="w-full border-2 border-yellow-300 rounded-lg p-3 focus:outline-none focus:border-yellow-600 font-mono text-sm shadow-inner">
    </div>

    <!-- 步驟 3：一鍵生成 -->
    <button id="generate-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-4 rounded-xl shadow-lg transition duration-200 text-xl mb-6 flex items-center justify-center gap-3">
        🚀 立即生成高階克漏字
    </button>

    <!-- 狀態與結果顯示 -->
    <div id="status-msg" class="text-center font-bold mb-4 hidden py-2 px-4 rounded-lg"></div>

    <div class="mb-2">
        <div class="flex justify-between items-end mb-2">
            <label class="block text-gray-800 font-bold text-lg">📋 生成結果 (JSON 格式)</label>
            <button id="copy-btn" class="bg-green-600 hover:bg-green-700 text-white text-sm font-bold py-2 px-4 rounded-lg shadow-md hidden transition-all">一鍵複製結果</button>
        </div>
        <textarea id="result-output" class="w-full h-72 border-2 border-gray-300 rounded-xl p-4 font-mono text-sm focus:outline-none focus:border-indigo-500 bg-gray-50 shadow-inner" readonly placeholder="AI 產出的結果將顯示於此..."></textarea>
        <p class="text-xs text-gray-500 mt-2">💡 複製後請回到「主系統」，貼在管理題庫視窗的第三步區塊中。</p>
    </div>
</div>

<script>
    // 讀取網址上的單字參數
    const urlParams = new URLSearchParams(window.location.search);
    const wordsFromURL = urlParams.get('words');

    if (wordsFromURL) {
        document.getElementById('word-list-display').innerText = wordsFromURL;
    } else {
        document.getElementById('word-list-display').innerText = "❌ 錯誤：未偵測到參數。請從主測驗系統進入本頁面。";
        document.getElementById('word-list-display').classList.replace('bg-indigo-50', 'bg-red-50');
        document.getElementById('word-list-display').classList.replace('text-indigo-900', 'text-red-600');
        document.getElementById('generate-btn').disabled = true;
    }

    // 本機記憶體金鑰機制
    const apiKeyInput = document.getElementById('api-key-input');
    const savedKey = localStorage.getItem('gemini_api_key');
    if (savedKey) apiKeyInput.value = savedKey;

    apiKeyInput.addEventListener('change', (e) => {
        localStorage.setItem('gemini_api_key', e.target.value.trim());
    });

    // 呼叫 Gemini 2.5 Flash API
    document.getElementById('generate-btn').addEventListener('click', async () => {
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) return alert("請輸入 API Key！");
        
        const statusMsg = document.getElementById('status-msg');
        const resultOutput = document.getElementById('result-output');
        const copyBtn = document.getElementById('copy-btn');
        const generateBtn = document.getElementById('generate-btn');

        statusMsg.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
        statusMsg.classList.add('bg-blue-100', 'text-blue-800');
        statusMsg.innerText = "⏳ AI 正在撰寫高階短文中，請稍候約 10~15 秒...";
        resultOutput.value = "";
        copyBtn.classList.add('hidden');
        generateBtn.disabled = true;

        const prompt = `你現在是英文單字比賽命題教授。請用以下 6 個單字撰寫一篇高中進階程度的「短文克漏字」題組：
[ ${wordsFromURL} ]
要求：
1. 1 篇短文，5 個空格。
2. 5 個字為正解，1 個字為誘答。
3. 空格必須標記為：<span class='px-1 border-b border-black font-bold text-red-600'> 題號 </span>（題號依序為 1, 2, 3, 4, 5）。
4. 只輸出純 JSON 格式，翻譯不可有換行符號。格式如下：
{
  "words": ["(A) 字1", "(B) 字2", "(C) 字3", "(D) 字4", "(E) 字5", "(F) 字6"],
  "paras": ["第一段...", "第二段..."],
  "ans": ["A", "C", "D", "B", "E"],
  "trans": "全篇中文翻譯",
  "exp": ["解析1", "解析2", "解析3", "解析4", "解析5"],
  "distractor": "誘答字說明"
}`;

        try {
            // 使用 Gemini 2.5 Flash 預覽版
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error.message || "API 呼叫失敗");

            let aiText = data.candidates[0].content.parts[0].text;
            
            // 強制淨化 JSON
            aiText = aiText.replace(/```json/gi, '').replace(/```/g, '').trim();
            let jsonStart = aiText.indexOf('{');
            let jsonEnd = aiText.lastIndexOf('}');
            if (jsonStart !== -1 && jsonEnd !== -1) {
                aiText = aiText.substring(jsonStart, jsonEnd + 1);
            }

            // 驗證 JSON 合法性
            JSON.parse(aiText);

            resultOutput.value = aiText;
            statusMsg.classList.replace('bg-blue-100', 'bg-green-100');
            statusMsg.classList.replace('text-blue-800', 'text-green-800');
            statusMsg.innerText = "✅ 文章生成成功！請點擊按鈕複製。";
            copyBtn.classList.remove('hidden');

        } catch (error) {
            statusMsg.classList.replace('bg-blue-100', 'bg-red-100');
            statusMsg.classList.replace('text-blue-800', 'text-red-800');
            statusMsg.innerText = `❌ 失敗：${error.message}`;
        } finally {
            generateBtn.disabled = false;
        }
    });

    document.getElementById('copy-btn').addEventListener('click', () => {
        const resultOutput = document.getElementById('result-output');
        resultOutput.select();
        document.execCommand('copy');
        alert("✅ JSON 內容已複製！請回到主系統管理視窗貼上。");
    });
</script>
</body>
</html>
